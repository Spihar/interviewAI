<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <title>InterviewAI</title>
</head>

<body class="bg-slate-950 text-white min-h-screen">

  <!-- Main Container -->
  <div class="max-w-5xl mx-auto px-6 py-10">

    <!-- Header -->
    <div class="mb-10 text-center">
      <h1 class="text-5xl font-bold tracking-tight text-blue-400 mb-3">
        InterviewAI
      </h1>
      <p class="text-slate-400 text-lg">
        Practice interviews with your AI-powered assistant
      </p>
    </div>

    <!-- Grid Layout -->
    <div class="grid md:grid-cols-2 gap-8">

      <!-- Left Side -->
      <div class="bg-slate-900 rounded-2xl p-6 shadow-lg border border-slate-800">

        <h2 class="text-2xl font-semibold mb-5">Resume Upload</h2>

        <input 
          type="file" 
          id="resumeFile"
          class="block w-full text-sm text-slate-300
          file:mr-4 file:py-2 file:px-4
          file:rounded-lg file:border-0
          file:text-sm file:font-semibold
          file:bg-blue-500 file:text-white
          hover:file:bg-blue-600 mb-4"
        >

        <button
          type="button"
          onclick="uploadResume()"
          class="w-full bg-blue-500 hover:bg-blue-600 transition rounded-xl py-3 font-semibold"
        >
          Upload Resume
        </button>

      </div>

      <!-- Right Side -->
      <div class="bg-slate-900 rounded-2xl p-6 shadow-lg border border-slate-800">

        <h2 class="text-2xl font-semibold mb-5">Interview Chat</h2>

        <textarea
          id="history"
          rows="7"
          placeholder="Enter your answer here..."
          class="w-full bg-slate-800 border border-slate-700 rounded-xl p-4 text-white placeholder-slate-500 resize-none focus:outline-none focus:ring-2 focus:ring-blue-500"
        ></textarea>

        <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 mt-4">

          <button
            onclick="startRecording()"
            class="bg-green-500 hover:bg-green-600 py-3 rounded-xl font-semibold"
          >
            Start Recording
          </button>

          <button
            onclick="stopRecording()"
            class="bg-red-500 hover:bg-red-600 py-3 rounded-xl font-semibold"
          >
            Stop Recording
          </button>

          <button
            onclick="askAI()"
            class="bg-blue-500 hover:bg-blue-600 py-3 rounded-xl font-semibold"
          >
            Ask AI
          </button>

        </div>

      </div>

    </div>

    <!-- Response Section -->
    <div class="mt-8 bg-slate-900 rounded-2xl p-6 shadow-lg border border-slate-800">

      <h2 class="text-2xl font-semibold mb-4">AI Response</h2>

      <div 
        id="chat"
        class="min-h-[150px] bg-slate-800 rounded-xl p-4 text-slate-200"
      >
      </div>

    </div>

    <!-- End Button -->
    <div class="mt-8 text-center">
      <button
        type="button"
        onclick="endInterview()"
        class="bg-red-600 hover:bg-red-700 px-8 py-3 rounded-xl font-semibold text-lg"
      >
        End Interview
      </button>
    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
