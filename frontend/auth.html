<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InterviewAI — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="auth.css" />
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-dot">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
    </div>
    InterviewAI
  </div>
  <p class="tagline">AI-powered mock interviews with real feedback</p>

  <div class="tabs">
    <button class="tab active" id="tabLogin"  onclick="switchTab('login')">Sign In</button>
    <button class="tab"        id="tabSignup" onclick="switchTab('signup')">Create Account</button>
  </div>

  <div class="field" id="nameField">
    <label>Full Name</label>
    <input type="text" id="nameInput" placeholder="John Smith" autocomplete="name" />
  </div>
  <div class="field">
    <label>Email</label>
    <input type="email" id="emailInput" placeholder="you@example.com" autocomplete="email" />
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="passwordInput" placeholder="••••••••" autocomplete="current-password" />
  </div>

  <button class="submit-btn" id="submitBtn" onclick="handleSubmit()">
    <span class="btn-label" id="btnLabel">Sign In</span>
    <div class="spinner"></div>
  </button>

  <div class="alert" id="alertBox"></div>

  <div class="divider">or</div>

  <button class="google-btn" onclick="signInWithGoogle()">
    <svg viewBox="0 0 48 48">
      <path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.7 32.7 29.2 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34.5 6.5 29.5 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.6-.4-3.9z"/>
      <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16.1 19 13 24 13c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34.5 6.5 29.5 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
      <path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.2 35.3 26.7 36 24 36c-5.2 0-9.6-3.3-11.3-8H6.1C9.5 35.6 16.2 44 24 44z"/>
      <path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.3-2.4 4.2-4.4 5.5l6.2 5.2C36.9 39.6 44 34 44 24c0-1.3-.1-2.6-.4-3.9z"/>
    </svg>
    Continue with Google
  </button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
</body>
</html>
